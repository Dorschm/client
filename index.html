<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>client</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #242424;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}
		</style>
		<link id="-gd-engine-icon" rel="icon" type="image/png" href="client.icon.png" />
		<link rel="apple-touch-icon" href="client.apple-touch-icon.png"/>
		<link rel="manifest" href="client.manifest.json">
		<link rel="preload" href="client.wasm" as="fetch" type="application/wasm" crossorigin="anonymous">
		<link rel="preload" href="client.pck" as="fetch" crossorigin="anonymous">
	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" src="client.png" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="client.js"></script>
		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":true,"fileSizes":{"index.pck":13132944,"index.wasm":1642043},"focusCanvas":true,"gdextensionLibs":[],"serviceWorker":"index.service.worker.js"};
const engine = new Engine(GODOT_CONFIG);

function setStatusMode(mode) {
	const status = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	if (mode === 'hidden') {
		status.style.visibility = 'hidden';
		statusProgress.style.display = 'none';
	} else if (mode === 'progress') {
		status.style.visibility = 'visible';
		statusProgress.style.display = 'block';
	} else if (mode === 'notice') {
		status.style.visibility = 'visible';
		statusProgress.style.display = 'none';
	} else if (mode === 'indeterminate') {
		status.style.visibility = 'visible';
		statusProgress.style.display = 'none';
		status.classList.add('indeterminate');
	}
}

function setStatusNotice(text) {
	const notice = document.getElementById('status-notice');
	if (text) {
		notice.style.display = 'block';
		notice.textContent = text;
	} else {
		notice.style.display = 'none';
		notice.textContent = '';
	}
}

const missing = Engine.getMissingFeatures();
if (missing.length) {
	const missingDiv = document.createElement('div');
	missingDiv.className = 'missing-features';
	missingDiv.innerHTML = `
		<h1>Error</h1>
		<p>The following features required to run Godot projects on the Web are missing:</p>
		<ul>
			${missing.map((id) => `<li>${Engine.getMissingFeatureName(id)}</li>`).join('')}
		</ul>
	`;
	document.body.appendChild(missingDiv);
} else {
	engine.startGame({
		'onProgress': function (current, total) {
			const progressPercent = Math.round((current / total) * 100);
			if (total > 0) {
				const progress = document.getElementById('status-progress');
				progress.value = current;
				progress.max = total;
				progress.hidden = false;
				setStatusMode('progress');
				if (progressPercent === 100) {
					// Hide progress bar after loading is complete
					setTimeout(() => {
						setStatusMode('hidden');
					}, 200);
				}
			} else {
				setStatusMode('indeterminate');
			}
		},
	}).catch((err) => {
		console.error(err);
	});
}
		</script>
	</body>
</html>
